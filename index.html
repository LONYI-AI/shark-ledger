<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d7ff9">
<link rel="manifest" href="./manifest.json">
<title>鲨鱼记账</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>

<style>
:root{--bg:#f4f7fc;--line:#dfe8f6;--txt:#112842;--muted:#5f7690;--pri:#2d7ff9;--good:#1f9d57;--warn:#c77b00;--danger:#d64545}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
body{background:linear-gradient(145deg,#f8fbff,#d8e6ff);min-height:100vh;padding:14px;color:var(--txt)}
.ledger{max-width:1240px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 20px 60px rgba(13,41,85,.15);padding:16px 16px 92px}
.header{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.header h1{font-size:1.48rem;font-weight:700;display:flex;align-items:center;gap:8px}
.storage-status{font-size:.82rem;border:1px solid #cfe0fb;background:#eff5ff;color:#1d5cb7;border-radius:999px;padding:6px 12px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
.storage-status.persistent{background:#eaf8ef;border-color:#bde4c7;color:#1b7e49}
.storage-status.warning{background:#fff5e6;border-color:#ffdcb0;color:#9a5f00}
.storage-status.error{background:#ffecec;border-color:#f6c3c3;color:#b43333}
.data-tools{display:flex;flex-wrap:wrap;justify-content:flex-start;gap:8px;background:#f9fbff;border:1px solid var(--line);border-radius:16px;padding:10px;margin-bottom:14px}
.tool-btn{border:1px solid transparent;border-radius:999px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.export{background:#e9f1ff;color:#1c57ad;border-color:#cadcff}.import{background:#eaf8ef;color:#1f7e49;border-color:#c8e8d2}.backup{background:#fff4e4;color:#966000;border-color:#ffd9a8}.danger{background:#ffecec;color:#b13333;border-color:#f6c2c2}
.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:6px;border:1px solid var(--line);border-radius:15px;background:#f5f8ff;margin-bottom:14px}
.tab-btn{border:none;background:transparent;padding:10px 12px;border-radius:11px;font-size:.92rem;font-weight:650;color:#557089;cursor:pointer}
.tab-btn.active{background:#fff;color:#194c9b;box-shadow:0 4px 14px rgba(28,87,173,.14)}
.tab{display:none;animation:fade .16s ease-out}.tab.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{border:1px solid var(--line);border-radius:20px;background:#fff;padding:14px}
.card h2{font-size:1.02rem;margin-bottom:12px;display:flex;gap:8px;align-items:center}
.entry-grid{display:grid;grid-template-columns:1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:.75rem;color:#5d738d;font-weight:650}
.field input,.field select,.filters input,.filters select,.budget-row input,.food-form input{border:1px solid #d5e1f0;border-radius:12px;padding:10px 12px;font-size:.92rem;outline:none;background:#fff;color:var(--txt);width:100%}
.quick-food{margin-top:14px;padding-top:12px;border-top:1px dashed #c8d9ef;display:flex;flex-wrap:wrap;gap:8px}
.food-chip{display:inline-flex;gap:5px;align-items:center;border-radius:999px;border:1px solid #bdd2ec;background:#edf4ff;color:#1e4f95;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));border:none;border-radius:999px;padding:13px 22px;font-size:.96rem;font-weight:700;background:linear-gradient(90deg,#2272e7,#4597ff);color:#fff;box-shadow:0 12px 28px rgba(34,114,231,.36);cursor:pointer;z-index:900;display:inline-flex;gap:8px;align-items:center}
.fab.hidden{display:none}
.chart-card{margin-bottom:12px}.chart-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
#chartTitle{font-size:.95rem;color:#1d456f;font-weight:650}.chart-scroll{overflow-x:auto;border-radius:12px;border:1px solid #e4edf9;padding:8px;background:#fbfdff}
#expenseChart{min-height:280px}
.tx-head{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:10px}
.search{display:flex;align-items:center;gap:7px;border:1px solid #d6e2f1;border-radius:999px;padding:6px 11px;background:#f7faff}
.search input{border:none;outline:none;background:transparent;width:100%;font-size:.9rem}
.small,.ghost{border:1px solid #cbd9ed;border-radius:11px;padding:7px 10px;font-size:.8rem;font-weight:650;cursor:pointer;white-space:nowrap}
.small{background:#f3f8ff;color:#1f4f92}.ghost{background:#fff;color:#5e7692}
.advanced{display:none;margin-bottom:10px;border:1px solid #dce6f3;border-radius:14px;padding:10px;background:#f8fbff}
.advanced.open{display:block}
.filters{display:grid;grid-template-columns:1fr;gap:8px}
.filter-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.history{border:1px dashed #cfddf1;border-radius:12px;padding:9px;margin-bottom:10px;background:#fbfdff}
.history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.history-head span{font-size:.78rem;font-weight:650;color:#4e6884}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.hist{border:1px solid #c9dbf3;border-radius:999px;background:#edf5ff;color:#1f4f92;font-size:.76rem;padding:5px 8px;display:inline-flex;align-items:center;gap:5px}
.hist button{border:none;background:transparent;color:inherit;cursor:pointer;font-size:.74rem}
.tx-count{font-size:.76rem;font-weight:650;color:#2863b5;background:#eaf2ff;border:1px solid #cfe0fb;border-radius:999px;padding:6px 10px}
.tx-list{display:flex;flex-direction:column;gap:8px;max-height:520px;overflow-y:auto;padding-right:3px}
.tx{border:1px solid #e7edf7;border-radius:14px;padding:10px 11px;background:#fff;display:flex;align-items:center;gap:10px}
.tx-icon{width:34px;text-align:center;font-size:1.45rem}.tx-body{min-width:0;flex:1}
.tx-main{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-weight:650;font-size:.93rem}
.tx-tag{font-size:.67rem;border-radius:999px;padding:2px 8px;background:#e9f1ff;color:#1f5cb4;border:1px solid #cbdcff;font-weight:700}
.tx-note{font-size:.81rem;color:#627a93;margin-top:3px;word-break:break-all}
.tx-right{text-align:right;margin-left:6px;white-space:nowrap}
.amt{font-size:1rem;font-weight:700}.amt.expense{color:#d64545}.amt.income{color:#1f9d57}
.tx-date{margin-top:2px;font-size:.71rem;color:#65809a}
.del{border:none;border-radius:10px;background:#fff2f2;color:#be4040;padding:7px 8px;cursor:pointer;margin-left:4px}
.summary-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}
.sum{border:1px solid #e3ebf7;border-radius:14px;padding:12px;background:#fafdff}
.sum-label{color:#5d7590;font-size:.78rem;margin-bottom:5px;display:flex;gap:6px;align-items:center}
.sum-num{font-size:1.4rem;font-weight:740}.sum-num.income{color:#1f9d57}.sum-num.expense{color:#d64545}
.budget{margin-bottom:12px}.budget-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}
.inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.pill{border:1px solid #d7e3f4;border-radius:999px;background:#f6faff;color:#345a86;font-size:.8rem;font-weight:650;padding:5px 10px}
.progress{margin-bottom:10px}.track{height:9px;width:100%;border-radius:999px;background:#e7edf7;overflow:hidden;margin-top:4px}
.fill{height:100%;width:0;transition:width .24s ease;background:var(--good)}.fill.warn{background:var(--warn)}.fill.danger{background:var(--danger)}
.food-form{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}.food-form button{border:1px solid #c6d8f2;background:#edf5ff;color:#1f4f92;border-radius:11px;padding:10px 12px;font-weight:700;cursor:pointer}
.food-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
.food{border:1px solid #e4ebf6;border-radius:12px;padding:9px 10px;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px}
.food-name{font-size:.9rem;font-weight:650}.food-price{margin-left:8px;font-size:.78rem;color:#3d6289;border-radius:999px;background:#edf5ff;border:1px solid #c8daf2;padding:3px 7px}
.notif{position:fixed;top:18px;right:18px;background:#fff;border:1px solid #d7e2f0;border-left:4px solid #1f9d57;border-radius:12px;box-shadow:0 14px 28px rgba(0,35,77,.16);padding:11px 14px;font-size:.86rem;z-index:1500;display:none;align-items:center;gap:7px;max-width:340px}
.notif.show{display:inline-flex}.notif.warning{border-left-color:var(--warn)}.notif.error{border-left-color:var(--danger)}
.modal{position:fixed;inset:0;display:none;justify-content:center;align-items:center;z-index:1600;background:rgba(5,21,40,.46);padding:18px}
.modal.show{display:flex}.modal-content{background:#fff;border-radius:16px;border:1px solid #dce6f3;width:100%;max-width:500px;max-height:82vh;overflow-y:auto;padding:14px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.modal-close{border:none;border-radius:8px;padding:4px 8px;background:#f2f6fd;color:#4b6784;cursor:pointer;font-size:1.2rem}
.info{display:grid;gap:7px}.info-row{border:1px solid #e3ebf7;border-radius:10px;padding:9px 10px;display:flex;justify-content:space-between;gap:8px;font-size:.84rem}
.empty{text-align:center;color:#7a8ea3;font-size:.86rem;border:1px dashed #cfdbec;border-radius:14px;padding:22px 10px;background:#fafcff}
#fileInput{display:none}
@media (min-width:760px){.entry-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.filters{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.food-form{grid-template-columns:2fr 1fr auto;align-items:center}}
@media (min-width:1024px){.entry-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div id="notif" class="notif"><i class="fas fa-check-circle"></i><span id="notifText">操作成功</span></div>
<div id="storageModal" class="modal"><div class="modal-content"><div class="modal-head"><h3><i class="fas fa-database"></i> 存储详情</h3><button class="modal-close" id="closeStorage">&times;</button></div><div id="storageInfo" class="info"></div></div></div>
<div class="ledger">
<div class="header"><h1><i class="fas fa-shield-alt"></i> 鲨鱼记账</h1><div id="storageStatus" class="storage-status"><i class="fas fa-spinner fa-spin"></i><span>检查中</span></div></div>
<div class="data-tools"><button id="exportBtn" class="tool-btn export"><i class="fas fa-download"></i> 导出备份</button><button id="importBtn" class="tool-btn import"><i class="fas fa-upload"></i> 导入恢复</button><input id="fileInput" type="file" accept=".json"><button id="backupBtn" class="tool-btn backup"><i class="fas fa-save"></i> 立即备份</button><button id="clearBtn" class="tool-btn danger"><i class="fas fa-trash-alt"></i> 清空数据</button></div>
<div id="tabs" class="tabs"><button class="tab-btn" data-tab="accounting">记账</button><button class="tab-btn" data-tab="transactions">流水</button><button class="tab-btn" data-tab="stats">统计</button></div>
<section id="tab-accounting" class="tab"><div class="card"><h2><i class="fas fa-pen"></i> 快速记账</h2><div class="entry-grid"><div class="field"><label>类型</label><select id="typeSelect"><option value="expense" selected>支出</option><option value="income">收入</option></select></div><div class="field"><label>分类</label><select id="categorySelect"></select></div><div class="field"><label>金额 (¥)</label><input id="amountInput" type="number" step="0.01" min="0.01" placeholder="0.00"></div><div class="field"><label>备注</label><input id="noteInput" type="text" placeholder="午餐/工资..."></div><div class="field"><label>日期</label><input id="dateInput" type="date"></div></div><div id="quickFood" class="quick-food"></div></div></section>
<section id="tab-transactions" class="tab"><div class="card chart-card"><div class="chart-head"><div id="chartTitle"><i class="fas fa-chart-bar"></i> 支出分类（全部）</div></div><div class="chart-scroll"><canvas id="expenseChart" height="280"></canvas></div></div><div class="card"><h2><i class="fas fa-list"></i> 流水筛选</h2><div class="tx-head"><div class="search"><i class="fas fa-search"></i><input id="searchInput" type="text" placeholder="搜索备注或分类"></div><button id="toggleAdvanced" class="small"><i class="fas fa-sliders-h"></i> 高级筛选</button><span id="txCount" class="tx-count">0 / 0 笔</span></div><div id="advanced" class="advanced"><div class="filters"><input id="fMin" type="number" min="0" step="0.01" placeholder="最小金额"><input id="fMax" type="number" min="0" step="0.01" placeholder="最大金额"><input id="fFrom" type="date"><input id="fTo" type="date"><select id="fType"><option value="all">交易类型：全部</option><option value="expense">仅支出</option><option value="income">仅收入</option></select></div><div class="filter-actions"><button id="applyFilter" class="small"><i class="fas fa-check"></i> 应用筛选</button><button id="clearFilter" class="ghost"><i class="fas fa-broom"></i> 清空筛选</button></div></div><div class="history"><div class="history-head"><span><i class="fas fa-history"></i> 搜索历史</span><button id="clearHistory" class="ghost">清空历史</button></div><div id="historyList" class="history-list"></div></div><div id="txList" class="tx-list"><div class="empty">暂无记录</div></div></div></section>
<section id="tab-stats" class="tab"><div class="card"><h2><i class="fas fa-chart-line"></i> 财务总览</h2><div class="summary-grid"><div class="sum"><div class="sum-label"><i class="fas fa-wallet"></i> 总余额</div><div id="sumBalance" class="sum-num">¥0.00</div></div><div class="sum"><div class="sum-label"><i class="fas fa-arrow-down"></i> 收入</div><div id="sumIncome" class="sum-num income">¥0.00</div></div><div class="sum"><div class="sum-label"><i class="fas fa-arrow-up"></i> 支出</div><div id="sumExpense" class="sum-num expense">¥0.00</div></div></div></div>
<div class="card budget"><h2><i class="fas fa-bullseye"></i> 预算（统一模型）</h2><div class="budget-row"><input id="monthlyBudgetInput" type="number" min="0" step="100" placeholder="月预算"><button id="setMonthly" class="small">设置月预算</button></div><div class="inline"><span class="pill">本月支出：<strong id="monthExpense">¥0.00</strong></span><span id="monthRemain" class="pill">剩余 ¥0.00</span></div><div class="progress"><div class="inline"><span>月度进度</span><span id="monthPct" class="pill">0%</span></div><div class="track"><div id="monthFill" class="fill"></div></div></div><div class="inline"><span class="pill">派生日预算：<strong id="derivedDaily">¥0.00</strong></span><span class="pill">生效日预算：<strong id="effectiveDaily">¥0.00</strong></span></div><div class="budget-row"><input id="dailyOverrideInput" type="number" min="0" step="1" placeholder="手动覆盖当月日预算"><button id="setDailyOverride" class="small">设置覆盖</button></div><div class="inline"><button id="clearDailyOverride" class="ghost">清除本月覆盖</button><span class="pill">今日餐饮：<strong id="todayMeal">¥0.00</strong></span><span id="todayRemain" class="pill">剩余 ¥0.00</span></div><div class="progress"><div class="inline"><span>今日餐饮进度</span><span id="dayPct" class="pill">0%</span></div><div class="track"><div id="dayFill" class="fill"></div></div></div></div>
<div class="card"><h2><i class="fas fa-heart"></i> 常吃食物</h2><div class="food-form"><input id="foodNameInput" type="text" placeholder="菜名（如 番茄炒蛋）"><input id="foodPriceInput" type="number" min="0" step="0.1" placeholder="价格"><button id="addFoodBtn">添加</button></div><div id="foodList" class="food-list"></div></div></section>
</div>
<button id="fabAdd" class="fab"><i class="fas fa-plus-circle"></i> 记一笔</button>
<script>
const DB_NAME="SharkLedgerDB",DB_VERSION=1,STORE_NAME="transactions";
const BACKUP_KEY="shark_ledger_backup",LAST_SYNC_KEY="shark_ledger_last_sync_ts",FAVORITE_FOODS_KEY="favorite_foods_v3",MONTHLY_BUDGET_KEY="monthly_budget_total_v3",DAILY_BUDGET_OVERRIDE_KEY="daily_budget_override_v3",SEARCH_HISTORY_KEY="search_history_v3",ACTIVE_TAB_KEY="active_tab_v3",FILTER_STATE_KEY="filter_state_v3",FIRST_RUN_KEY="shark_ledger_first_run";
const CATEGORY_EMOJI={"餐饮":"🍔","购物":"🛒","交通":"🚗","娱乐":"🎬","医疗":"💊","其他":"📌","工资":"💰","兼职":"💼","投资":"📈"},EXPENSE_CATS=["餐饮","购物","交通","娱乐","医疗","其他"],INCOME_CATS=["工资","兼职","投资"];
const ui={activeTab:"accounting",advancedOpen:false,filters:{text:"",min:"",max:"",dateFrom:"",dateTo:"",type:"all",category:""},searchHistory:[]};
let db=null,isPersistent=false,storageEstimate=null,transactions=[],favoriteFoods=[],monthlyBudget=3000,dailyBudgetOverrides={},expenseChart=null,searchDebounceTimer=null;
const $=id=>document.getElementById(id),els={tabs:$("tabs"),storageStatus:$("storageStatus"),storageModal:$("storageModal"),storageInfo:$("storageInfo"),closeStorage:$("closeStorage"),notif:$("notif"),notifText:$("notifText"),typeSelect:$("typeSelect"),categorySelect:$("categorySelect"),amountInput:$("amountInput"),noteInput:$("noteInput"),dateInput:$("dateInput"),quickFood:$("quickFood"),searchInput:$("searchInput"),toggleAdvanced:$("toggleAdvanced"),advanced:$("advanced"),fMin:$("fMin"),fMax:$("fMax"),fFrom:$("fFrom"),fTo:$("fTo"),fType:$("fType"),applyFilter:$("applyFilter"),clearFilter:$("clearFilter"),clearHistory:$("clearHistory"),historyList:$("historyList"),txCount:$("txCount"),txList:$("txList"),chartTitle:$("chartTitle"),chartCanvas:$("expenseChart"),sumBalance:$("sumBalance"),sumIncome:$("sumIncome"),sumExpense:$("sumExpense"),monthlyBudgetInput:$("monthlyBudgetInput"),setMonthly:$("setMonthly"),monthExpense:$("monthExpense"),monthRemain:$("monthRemain"),monthFill:$("monthFill"),monthPct:$("monthPct"),derivedDaily:$("derivedDaily"),effectiveDaily:$("effectiveDaily"),dailyOverrideInput:$("dailyOverrideInput"),setDailyOverride:$("setDailyOverride"),clearDailyOverride:$("clearDailyOverride"),todayMeal:$("todayMeal"),todayRemain:$("todayRemain"),dayFill:$("dayFill"),dayPct:$("dayPct"),foodNameInput:$("foodNameInput"),foodPriceInput:$("foodPriceInput"),addFoodBtn:$("addFoodBtn"),foodList:$("foodList"),fabAdd:$("fabAdd"),exportBtn:$("exportBtn"),importBtn:$("importBtn"),backupBtn:$("backupBtn"),clearBtn:$("clearBtn"),fileInput:$("fileInput")};
function esc(v){return String(v).replace(/[&<>"']/g,m=>m==="&"?"&amp;":m==="<"?"&lt;":m===">"?"&gt;":m==='"'?"&quot;":"&#39;")} function fm(v){return "¥"+(Number(v)||0).toFixed(2)} function pn(v){const n=Number(v);return Number.isFinite(n)?Math.round(n*100)/100:null}
function tday(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")} function mkey(d){return d?d.slice(0,7):tday().slice(0,7)} function curM(){return mkey(tday())} function dim(k){const [year,month]=k.split("-").map(Number);return new Date(year,month,0).getDate()} // month 是 1-12，day=0 取该月最后一天
function csum(d){const s=JSON.stringify(d);let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return String(h)}
function note(msg,type){els.notifText.textContent=msg;els.notif.className="notif show";const i=els.notif.querySelector("i");i.className="fas fa-check-circle";if(type==="warning"){els.notif.classList.add("warning");i.className="fas fa-exclamation-triangle"}if(type==="error"){els.notif.classList.add("error");i.className="fas fa-exclamation-circle"}setTimeout(()=>els.notif.classList.remove("show"),2600)}
function norm(f){const x={text:"",min:"",max:"",dateFrom:"",dateTo:"",type:"all",category:"",...(f||{})};x.text=String(x.text||"").trim();x.min=x.min==null?"":String(x.min);x.max=x.max==null?"":String(x.max);x.dateFrom=String(x.dateFrom||"");x.dateTo=String(x.dateTo||"");x.type=["all","expense","income"].includes(x.type)?x.type:"all";x.category=String(x.category||"");return x}
function emptyFilter(f){const x=norm(f);return !x.text&&!x.min&&!x.max&&!x.dateFrom&&!x.dateTo&&x.type==="all"&&!x.category}
function dayDer(){return monthlyBudget/Math.max(1,dim(curM()))} function dayEff(){const o=dailyBudgetOverrides[curM()];return Number.isFinite(o)&&o>=0?o:dayDer()}

async function reconcile(){const [idb,ls]=await Promise.all([loadIDB(),Promise.resolve(loadLS())]);const hI=Array.isArray(idb)&&idb.length>0,hL=!!(ls&&Array.isArray(ls.data)&&ls.data.length>0);let w=[],ts=0;
if((hI||hL)&&!localStorage.getItem(FIRST_RUN_KEY))localStorage.setItem(FIRST_RUN_KEY,"true");
if(!hI&&!hL){const firstRun=localStorage.getItem(FIRST_RUN_KEY);if(!firstRun){w=samples();ts=Date.now();localStorage.setItem(FIRST_RUN_KEY,"true")}else{w=[];ts=Date.now()}}else if(!hI&&hL){w=ls.data;ts=ls.timestamp||inferTs(ls.data)||Date.now();console.log("启动恢复:IDB空->LS")}else if(hI&&!hL){w=idb;ts=inferTs(idb)||Date.now();console.log("启动恢复:LS空->IDB")}else{const ci=csum(idb),cl=ls.checksum||csum(ls.data);if(ci===cl){const ti=inferTs(idb)||0,tl=ls.timestamp||0;w=tl>=ti?ls.data:idb;ts=Math.max(ti,tl)||Date.now()}else{const ti=inferTs(idb)||0,tl=ls.timestamp||inferTs(ls.data)||0;if(tl>=ti){w=ls.data;ts=tl||Date.now();console.log("启动仲裁:LS较新")}else{w=idb;ts=ti||Date.now();console.log("启动仲裁:IDB较新")}}}
await saveIDB(w);saveLS(w,ts||Date.now());return w}

function sortTx(arr){return arr.sort((a,b)=>a.date!==b.date?(a.date>b.date?-1:1):(Number(b.timestamp)||0)-(Number(a.timestamp)||0))}
function matchTx(t,f,ignoreCat){const x=norm(f);if(x.text){const y=((t.note||"")+" "+(t.category||"")).toLowerCase();if(!y.includes(x.text.toLowerCase()))return false}if(x.min!==""){const m=Number(x.min);if(Number.isFinite(m)&&Number(t.amount)<m)return false}if(x.max!==""){const m=Number(x.max);if(Number.isFinite(m)&&Number(t.amount)>m)return false}if(x.dateFrom&&t.date<x.dateFrom)return false;if(x.dateTo&&t.date>x.dateTo)return false;if(x.type!=="all"&&t.type!==x.type)return false;if(!ignoreCat&&x.category&&t.category!==x.category)return false;return true}

els.quickFood.addEventListener("click",e=>{const b=e.target.closest(".food-chip");if(b)quickAdd(b.dataset.id)});els.searchInput.addEventListener("input",()=>{clearTimeout(searchDebounceTimer);searchDebounceTimer=setTimeout(()=>{ui.filters.text=els.searchInput.value.trim();saveFilterState();renderAll()},300)});

els.historyList.addEventListener("click",e=>{const b=e.target.closest("button[data-act]");if(!b)return;const id=b.dataset.id,it=ui.searchHistory.find(x=>x.id===id);if(!it)return;if(b.dataset.act==="apply"){ui.filters=norm(it.filter);syncFilterInputs();saveFilterState();renderAll()}else{ui.searchHistory=ui.searchHistory.filter(x=>x.id!==id);saveHistory();renderHistory()}});
els.clearHistory.addEventListener("click",()=>{ui.searchHistory=[];saveHistory();renderHistory()});
els.txList.addEventListener("click",async e=>{const b=e.target.closest(".del");if(!b||!b.dataset.id)return;if(!confirm("确定删除这条记录吗？"))return;transactions=transactions.filter(t=>t.id!==b.dataset.id);await saveData();renderAll();note("记录已删除","warning")});
els.addFoodBtn.addEventListener("click",()=>addFood());els.foodList.addEventListener("click",e=>{const b=e.target.closest(".del-food");if(b)delFood(b.dataset.id)});
els.setMonthly.addEventListener("click",()=>{const v=pn(els.monthlyBudgetInput.value.trim());if(v===null||v<0){alert("请输入有效的月预算");return}monthlyBudget=v;saveBudget();renderBudget();note("月预算已更新")});
els.setDailyOverride.addEventListener("click",()=>{const v=pn(els.dailyOverrideInput.value.trim());if(v===null||v<0){alert("请输入有效的日预算覆盖值");return}dailyBudgetOverrides[curM()]=v;saveBudget();renderBudget();note("本月日预算覆盖已更新")});
els.clearDailyOverride.addEventListener("click",()=>{delete dailyBudgetOverrides[curM()];saveBudget();renderBudget();note("本月日预算覆盖已清除","warning")});
els.exportBtn.addEventListener("click",exportData);els.backupBtn.addEventListener("click",()=>{saveLS(transactions,Date.now());note("已写入本地备份")});els.importBtn.addEventListener("click",()=>els.fileInput.click());els.fileInput.addEventListener("change",()=>{const f=els.fileInput.files[0];importData(f);els.fileInput.value=""});els.clearBtn.addEventListener("click",clearAll);
window.addEventListener("storage",async e=>{if(e.key!==BACKUP_KEY)return;transactions=await reconcile();renderAll()});document.addEventListener("visibilitychange",async()=>{if(document.hidden)return;transactions=await reconcile();renderAll();updateEstimate()});window.addEventListener("beforeunload",()=>{if(!transactions.length)return;saveLS(transactions,Date.now())})}
function regSW(){if(!("serviceWorker"in navigator))return;navigator.serviceWorker.register("./sw.js").then(reg=>{console.log("Service Worker 注册成功",reg);if(reg.waiting)console.log("Service Worker: 已有待激活新版本，刷新后生效");reg.addEventListener("updatefound",()=>{const w=reg.installing;if(!w)return;w.addEventListener("statechange",()=>{if(w.state==="installed"&&navigator.serviceWorker.controller)console.log("Service Worker 已更新，下次刷新生效")})})}).catch(err=>console.error("Service Worker 注册失败，已降级为在线模式",err));navigator.serviceWorker.addEventListener("controllerchange",()=>console.log("Service Worker controller 已切换"))}
async function init(){bind();loadUI();loadFav();loadBudget();syncFilterInputs();setTab(ui.activeTab);setDate();populateCat();renderFoods();initChart();await initDB();await reqPersist();await updateEstimate();transactions=await reconcile();renderAll();regSW();setInterval(updateEstimate,30000);setTimeout(()=>note("数据加载完成"),220)}
init();
</script>
</body>
